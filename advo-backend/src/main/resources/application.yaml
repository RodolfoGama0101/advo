spring:
  application:
    name: advo

  datasource:
    url: jdbc:mariadb://localhost:3306/advo_db?createDatabaseIfNotExist=true
    username: root
    password: root_password
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

advo:
  security:
    jwt:
      secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration-ms: 86400000 # 24 horas
      refresh-expiration-ms: 604800000 # 7 dias
  storage:
    upload-dir: uploads/documentos

server:
  port: 8045