spring:
  datasource:
    url: jdbc:h2:mem:advo_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false # Desabilita Flyway para testes com H2 (usa o create-drop do Hibernate)

advo:
  security:
    jwt:
      secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration-ms: 3600000 # 1 hora
      refresh-expiration-ms: 86400000 # 24 horas
  storage:
    upload-dir: target/test-uploads/documentos
